<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Selvam Medicals</title>
    <link rel="stylesheet" href="/static/css/dashboard1.css">
    <link rel="stylesheet" href="/static/css/sidebar.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="dashboard-bg">

    <div class="app-container">
        <div id="sidebar-target"></div>

        <div class="main-content">
            <div id="header-target"></div>

            <main class="dashboard-body">
                <div class="welcome-section">
                    <h1 class="welcome-title">WELCOME</h1>
                    <p class="welcome-sub">Select a module from menu</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card green-border">
                        <span class="stat-label">Today's Sales</span>
                        <h2 class="stat-value" id="val-sales">Rs 18,750</h2>
                    </div>

                    <div class="stat-card blue-border">
                        <span class="stat-label">Bills Generated</span>
                        <h2 class="stat-value" id="val-bills">52</h2>
                    </div>

                    <div class="stat-card purple-border">
                        <span class="stat-label">Low Stock Items</span>
                        <h2 class="stat-value" id="val-lowstock">15</h2>
                    </div>

                    <div class="stat-card yellow-border">
                        <span class="stat-label">Expiring Soon</span>
                        <h2 class="stat-value" id="val-expiring">5</h2>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/dashboard1.js"></script>
    <script src="/static/js/header.js"></script>
    <script src="/static/js/sidebar.js"></script>
</body>

</html>
