<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selvam Medicals – Purchase Registers</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&family=Jersey+15&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar-header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/purchaseregister.css') }}">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="left-panel">
    <div class="logo">
      <div class="SM">SM</div>
      <div class="logo-text">
        <p>Selvam</p>
        <p>Medicals</p>
      </div>
    </div>

    <select class="side-bar-dropdown">
      <option value="" disabled selected hidden>Timeline...</option>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

    <p class="sec-label">MENU</p>

    <div class="row"><div class="opt"><i class="fa-solid fa-chart-line"></i><p class="opt-text">Sales</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-cart-shopping"></i><p class="opt-text">Purchase</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-list"></i><p class="opt-text">Item</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-users"></i><p class="opt-text">Masters</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-desktop"></i><p class="opt-text">System</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-toolbox"></i><p class="opt-text">Utilities</p></div></div>
    <div class="row sms"><div class="opt"><i class="fa-solid fa-comment-dots"></i><p class="opt-text">SMS</p></div></div>

    <p class="sec-label other">OTHER</p>

    <div class="row settings"><div class="opt"><i class="fa-solid fa-gear"></i><p class="opt-text">Settings</p></div></div>

    <div class="spacer"></div>

    <div class="row logout"><div class="opt"><i class="fa-solid fa-right-from-bracket"></i><p class="opt-text">Logout</p></div></div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="main" id="mainPanel">

    <!-- HEADER -->
    <header class="header">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
      </div>

      <div class="fy">FY: 2026-2027</div>

      <div class="divider-1"></div>

      <div class="date-block">
        <span class="date-val" id="date-val"></span>
        <span class="day-val"  id="day-val"></span>
      </div>

      <div class="divider-2"></div>

      <div class="clock" id="clock">00:00:00</div>

      <div class="divider-3"></div>

      <div class="user">
        <img src="{{ url_for('static', filename='images/user-profile.jpg') }}" alt="User">
        <span>Name</span>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- BREADCRUMB -->
      <div class="breadcrumb-bar">
        <span class="breadcrumb-parent">Purchase</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18L15 12L9 6"/>
        </svg>
        <span class="breadcrumb-current">Purchase Registers</span>
      </div>

      <!-- CENTER STAGE -->
      <div class="center-stage">
        <div class="menu-card">

          <div class="menu-card-title">
            <h1>Select Your Choice</h1>
          </div>

          <div class="menu-btn-list">
            <button class="menu-btn" data-id="1">
              <span class="btn-num">1</span><span class="btn-dash">–</span>
              <span class="btn-label">Purchase Register</span>
            </button>
            <button class="menu-btn" data-id="2">
              <span class="btn-num">2</span><span class="btn-dash">–</span>
              <span class="btn-label">VAT - Purchase Register (Bill, Taxwise) Annexure 1</span>
            </button>
            <button class="menu-btn" data-id="3">
              <span class="btn-num">3</span><span class="btn-dash">–</span>
              <span class="btn-label">Salestax Format</span><span class="btn-suffix">- Before VAT</span>
            </button>
            <button class="menu-btn" data-id="4">
              <span class="btn-num">4</span><span class="btn-dash">–</span>
              <span class="btn-label">Form A9</span><span class="btn-suffix">- Before VAT</span>
            </button>
            <button class="menu-btn" data-id="5">
              <span class="btn-num">5</span><span class="btn-dash">–</span>
              <span class="btn-label">RST Report</span><span class="btn-suffix">- Before VAT</span>
            </button>
            <button class="menu-btn" data-id="6">
              <span class="btn-num">6</span><span class="btn-dash">–</span>
              <span class="btn-label">Purchase Itemwise Report</span>
            </button>
            <button class="menu-btn" data-id="7">
              <span class="btn-num">7</span><span class="btn-dash">–</span>
              <span class="btn-label">Purchase Pkg, Tax Differences Report</span>
            </button>
            <button class="menu-btn" data-id="8">
              <span class="btn-num">8</span><span class="btn-dash">–</span>
              <span class="btn-label">Purchase Register - Supplierwise</span>
            </button>
          </div>

          <div class="choice-row">
            <div class="choice-label">Choice</div>
            <div class="choice-buttons">
              <button class="choice-btn" data-choice="1">1</button>
              <button class="choice-btn" data-choice="2">2</button>
              <button class="choice-btn" data-choice="3">3</button>
              <button class="choice-btn" data-choice="4">4</button>
              <button class="choice-btn" data-choice="5">5</button>
              <button class="choice-btn" data-choice="6">6</button>
              <button class="choice-btn" data-choice="7">7</button>
              <button class="choice-btn" data-choice="8">8</button>
            </div>
          </div>

        </div>
      </div>

    </div><!-- /content-area -->

  </div><!-- /main -->

</div><!-- /app -->

<script src="{{ url_for('static', filename='js/sidebar-header.js') }}"></script>
<script src="{{ url_for('static', filename='js/purchaseregister.js') }}"></script>

</body>
</html>
