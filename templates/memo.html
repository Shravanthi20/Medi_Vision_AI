<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selvam Medicals – Memo</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&family=Jersey+15&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar-header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/memo.css') }}">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="left-panel">
    <div class="logo">
      <div class="SM">SM</div>
      <div class="logo-text">
        <p>Selvam</p>
        <p>Medicals</p>
      </div>
    </div>

    <select class="side-bar-dropdown">
      <option value="" disabled selected hidden>Timeline...</option>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

    <p class="sec-label">MENU</p>

    <div class="row"><div class="opt"><i class="fa-solid fa-chart-line"></i><p class="opt-text">Sales</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-cart-shopping"></i><p class="opt-text">Purchase</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-list"></i><p class="opt-text">Item</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-users"></i><p class="opt-text">Masters</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-desktop"></i><p class="opt-text">System</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-toolbox"></i><p class="opt-text">Utilities</p></div></div>
    <div class="row sms"><div class="opt"><i class="fa-solid fa-comment-dots"></i><p class="opt-text">SMS</p></div></div>

    <p class="sec-label other">OTHER</p>

    <div class="row settings"><div class="opt"><i class="fa-solid fa-gear"></i><p class="opt-text">Settings</p></div></div>

    <div class="spacer"></div>

    <div class="row logout"><div class="opt"><i class="fa-solid fa-right-from-bracket"></i><p class="opt-text">Logout</p></div></div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="main" id="mainPanel">

    <!-- HEADER -->
    <header class="header">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
      </div>
      <div class="fy">FY: 2026-2027</div>
      <div class="divider-1"></div>
      <div class="date-block">
        <span class="date-val" id="date-val"></span>
        <span class="day-val" id="day-val"></span>
      </div>
      <div class="divider-2"></div>
      <div class="clock" id="clock">00:00:00</div>
      <div class="divider-3"></div>
      <div class="user">
        <img src="{{ url_for('static', filename='images/user-profile.jpg') }}" alt="User">
        <span>Name</span>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- BREADCRUMB -->
      <div class="breadcrumb-bar">
        <span class="breadcrumb-parent">Sales</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18L15 12L9 6"/>
        </svg>
        <span class="breadcrumb-current">MEMO</span>
      </div>

      <!-- CENTER STAGE -->
      <div class="center-stage">
        <div class="memo-card">

          <!-- TOP BAND -->
          <div class="memo-top-band"></div>

          <!-- FORM BODY -->
          <div class="memo-form">

            <div class="form-row">
              <label class="form-label">Memo Date</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="memoDate">
                <button class="calendar-btn" type="button">
                  <i class="fa-regular fa-calendar"></i>
                </button>
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">Invoice Number</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="invoiceNumber">
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">Supplier Code</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="supplierCode">
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">Amount</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="amount">
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">Towards</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="towards">
              </div>
            </div>

            <div class="form-row">
              <label class="form-label">Due Date</label>
              <span class="form-colon">:</span>
              <div class="input-wrap">
                <input type="text" class="form-input" id="dueDate">
                <button class="calendar-btn" type="button">
                  <i class="fa-regular fa-calendar"></i>
                </button>
              </div>
            </div>

          </div><!-- /memo-form -->

          <!-- BOTTOM BAND -->
          <div class="memo-bottom-band"></div>

        </div><!-- /memo-card -->
      </div><!-- /center-stage -->

      <!-- BOTTOM ACTION BAR — plain text menu -->
      <div class="action-bar">
        <button class="action-item active">Add</button>
        <button class="action-item dimmed">Modify</button>
        <button class="action-item dimmed">Delete</button>
        <button class="action-item active">View</button>
        <button class="action-item active">Go To</button>
        <button class="action-item active">Next</button>
        <button class="action-item active">Prior</button>
        <button class="action-item dimmed">Options</button>
        <button class="action-item active">Exit</button>
      </div>

    </div><!-- /content-area -->

  </div><!-- /main -->

</div><!-- /app -->

<script src="{{ url_for('static', filename='js/sidebar-header.js') }}"></script>
<script src="{{ url_for('static', filename='js/memo.js') }}"></script>

</body>
</html>
